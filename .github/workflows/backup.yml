name: Weekly Database Backup

# Mengatur kapan robot ini berjalan
on:
  schedule:
    # Berjalan otomatis setiap hari Minggu jam 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Mengizinkan kita mengeklik tombol 'Run' secara manual kapan saja

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Ekspor Database (pg_dump)
        env:
          # Mengambil kunci dari brankas GitHub
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Menyalin data; sslmode=require memastikan koneksi dienkripsi
          pg_dump "$SUPABASE_DB_URL?sslmode=require" -F c -f database-backup.dump

      - name: Simpan File ke GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: saintifiks-db-backup-${{ github.run_id }}
          path: database-backup.dump
          retention-days: 30 # GitHub otomatis menghapus file ini setelah 30 hari